{{template "base" .}}
{{define "content"}}
<div class="auth-page">
    <div class="auth-card card">
        <h1 class="page-title">Connexion</h1>

        {{if .Registered}}
        <div class="alert alert-success">
            <p>Compte créé avec succès ! Vous pouvez maintenant vous connecter.</p>
        </div>
        {{end}}

        {{if .Error}}
        <div class="alert alert-error">
            <p>{{.Error}}</p>
        </div>
        {{end}}

        {{if .Errors}}
        <div class="alert alert-error">
            {{range .Errors}}
            <p>{{.}}</p>
            {{end}}
        </div>
        {{end}}

        <form action="/login" method="POST" class="form">
            <div class="form-group">
                <label for="identifier" class="form-label">Email ou nom d'utilisateur</label>
                <input type="text" id="identifier" name="identifier" class="form-input" value="{{.Identifier}}" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" id="password" name="password" class="form-input" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
        </form>
        <p class="auth-switch">Pas encore de compte ? <a href="/register">S'inscrire</a></p>
    </div>
</div>
{{end}}
