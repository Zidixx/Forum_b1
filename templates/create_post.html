{{template "base" .}}
{{define "content"}}
<div class="form-page">
    <div class="form-card glass-card">
        <h1 class="form-title">Nouveau sujet</h1>
        <p class="form-subtitle">Lance un débat, partage une actu, donne ton avis</p>

        {{if .Errors}}
        <div class="alert alert-error">{{range .Errors}}{{.}} {{end}}</div>
        {{end}}

        <form action="/post/create" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title" class="form-label">Titre</label>
                <input type="text" id="title" name="title" class="form-input" value="{{.Title}}" required maxlength="200" placeholder="Ex: Mbappé au Real, bonne ou mauvaise idée ?">
            </div>

            <div class="form-group">
                <label for="content" class="form-label">Ton analyse</label>
                <textarea id="content" name="content" class="form-textarea" rows="6" required placeholder="Développe ton point de vue...">{{.Content}}</textarea>
            </div>

            <div class="form-row">
                <div class="form-group form-group-half">
                    <label class="form-label">Catégorie</label>
                    <div class="checkbox-grid">
                        {{range .Categories}}
                        <label class="checkbox-card">
                            <input type="checkbox" name="categories" value="{{.ID}}" {{if $.SelectedCats}}{{if contains $.SelectedCats .ID}}checked{{end}}{{end}}>
                            <span class="checkbox-card-inner">{{.Name}}</span>
                        </label>
                        {{end}}
                    </div>
                </div>
                <div class="form-group form-group-half">
                    <label for="league" class="form-label">Ligue (optionnel)</label>
                    <select id="league" name="league" class="form-select">
                        <option value="">Aucune ligue</option>
                        {{range leagues}}
                        <option value="{{.Slug}}" {{if eq .Slug $.League}}selected{{end}}>{{.Flag}} {{.Name}}</option>
                        {{end}}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="image" class="form-label">Image (optionnel)</label>
                <div class="file-upload" id="fileUpload">
                    <input type="file" id="image" name="image" accept="image/jpeg,image/png,image/gif">
                    <div class="file-upload-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        <span>Glisse une image ou clique ici</span>
                        <small>JPEG, PNG ou GIF — Max 20 Mo</small>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a href="/" class="btn-secondary">Annuler</a>
                <button type="submit" class="btn-primary btn-glow">Publier</button>
            </div>
        </form>
    </div>
</div>
{{end}}
