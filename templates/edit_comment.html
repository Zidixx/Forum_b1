{{template "base" .}}
{{define "content"}}
<div class="form-page">
    <div class="form-card glass-card">
        <h1 class="form-title">Modifier le commentaire</h1>

        {{if .Errors}}
        <div class="alert alert-error">{{range .Errors}}{{.}} {{end}}</div>
        {{end}}

        <form action="/comment/edit/{{.Comment.ID}}" method="POST">
            <div class="form-group">
                <textarea name="content" class="form-textarea" rows="5" required>{{.Comment.Content}}</textarea>
            </div>
            <div class="form-actions">
                <a href="/post/{{.Comment.PostID}}" class="btn-secondary">Annuler</a>
                <button type="submit" class="btn-primary">Enregistrer</button>
            </div>
        </form>
    </div>
</div>
{{end}}
