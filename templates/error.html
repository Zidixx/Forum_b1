{{define "base"}}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Vestiaire — Erreur {{.StatusCode}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="error-body">
    <canvas id="pitchCanvas" class="pitch-canvas"></canvas>

    <div class="error-container">
        <div class="error-card glass-card">
            <div class="error-ball">&#9917;</div>
            <h1 class="error-code">{{.StatusCode}}</h1>
            <p class="error-message">{{.Message}}</p>
            {{if .SubMessage}}<p class="error-sub">{{.SubMessage}}</p>{{end}}
            <a href="/" class="btn-primary btn-glow">Retour au vestiaire</a>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
{{template "base" .}}
{{define "content"}}{{end}}
