{{template "base" .}}
{{define "content"}}
<div class="form-page">
    <div class="form-card card">
        <h1 class="page-title">Modifier le post</h1>

        {{if .Errors}}
        <div class="alert alert-error">
            {{range .Errors}}
            <p>{{.}}</p>
            {{end}}
        </div>
        {{end}}

        <form action="/post/edit/{{.Post.ID}}" method="POST" enctype="multipart/form-data" class="form">
            <div class="form-group">
                <label for="title" class="form-label">Titre</label>
                <input type="text" id="title" name="title" class="form-input" value="{{.Post.Title}}" required maxlength="200">
            </div>
            <div class="form-group">
                <label for="content" class="form-label">Contenu</label>
                <textarea id="content" name="content" class="form-textarea" rows="8" required>{{.Post.Content}}</textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Catégories</label>
                <div class="checkbox-group">
                    {{$selected := .SelectedCats}}
                    {{range .Categories}}
                    <label class="checkbox-label">
                        <input type="checkbox" name="categories" value="{{.ID}}"
                            {{range $selected}}{{if eq . $.Categories}}checked{{end}}{{end}}>
                        {{.Name}}
                    </label>
                    {{end}}
                </div>
            </div>
            {{if .Post.ImagePath}}
            <div class="form-group">
                <label class="form-label">Image actuelle</label>
                <img src="/static/uploads/{{.Post.ImagePath}}" alt="Image actuelle" class="preview-image">
            </div>
            {{end}}
            <div class="form-group">
                <label for="image" class="form-label">Nouvelle image (optionnel)</label>
                <input type="file" id="image" name="image" class="form-input" accept="image/jpeg,image/png,image/gif">
                <small class="form-hint">JPEG, PNG ou GIF - Max 20 Mo</small>
            </div>
            <div class="form-actions">
                <a href="/post/{{.Post.ID}}" class="btn btn-secondary">Annuler</a>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
            </div>
        </form>
    </div>
</div>
{{end}}
